# FreeRADIUS clients.conf
# NAS (Network Access Server) listesi — hangi cihazlar RADIUS'a istek atabilir

# localhost — radtest ile test için
client localhost {
    ipaddr  = 127.0.0.1
    secret  = testing123
    shortname = localhost
}

# Docker ağı üzerindeki tüm adresler — geliştirme ortamı için
client docker_net {
    ipaddr  = 0.0.0.0/0
    secret  = testing123
    shortname = docker
}
